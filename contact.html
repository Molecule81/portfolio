<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link rel="stylesheet" href="contact.css">
    <link rel="icon" type="png" href="pictures/icons/logo.png">
</head>
<body>
    <h1>Lets Get In Touch</h1>
    <form id="contactForm" action="" method="post">
        <h2>All fields are required</h2>
        <label for="name">Name</label>
        <input type="text" id="name" name="name" autofocus required placeholder="e.g: name">

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="e.g: example@gmail.com">

        <label for="message">Message</label>
        <textarea name="message" id="message" required 
        placeholder="Type your message here..."
        cols="10" rows="7"></textarea>

        <div>
            <p id="response" style="text-align: center; margin-bottom: 10px;"></p>
        </div>
        <button type="submit">Send Message</button>
        <p style="text-align: center; margin-top: 7px;"><a id="back" href="index.html">Back To Home</a></p>
    </form>

    <footer>
        <p>&copy;Copyright HKM All Rights Reserved</p>
    </footer>

    <script src="contact.js"></script>
</body>
</html>
